name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      # The OAS version (3.0 / 3.1) is per-document runtime data, so a
      # single test run exercises both output shapes. The only feature
      # axis left is `inventory` (on by default): the
      # `--no-default-features` steps keep the opt-out path — no_std /
      # WASM-leaning consumers without linker-based registration —
      # green alongside the default one.
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - name: cargo build
        run: cargo build --workspace
      - name: cargo build (no default features)
        run: cargo build --workspace --no-default-features
      - name: cargo test
        run: cargo test --workspace
      - name: cargo test (no default features)
        run: cargo test --workspace --no-default-features

  validate-title:
    name: validate-title
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            revert
