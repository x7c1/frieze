name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      # `oas-3-0` and `oas-3-1` are mutually exclusive (see
      # `frieze-openapi`'s `compile_error!` guards); each feature set is
      # checked in its own step.
      - name: cargo clippy (oas-3-0)
        run: cargo clippy --workspace --all-targets --no-default-features --features oas-3-0 -- -D warnings
      - name: cargo clippy (oas-3-1)
        run: cargo clippy --workspace --all-targets --no-default-features --features oas-3-1 -- -D warnings
      - name: cargo build (oas-3-0)
        run: cargo build --workspace --no-default-features --features oas-3-0
      - name: cargo build (oas-3-1)
        run: cargo build --workspace --no-default-features --features oas-3-1
      - name: cargo test (oas-3-0)
        run: cargo test --workspace --no-default-features --features oas-3-0
      - name: cargo test (oas-3-1)
        run: cargo test --workspace --no-default-features --features oas-3-1

  validate-title:
    name: validate-title
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            revert
