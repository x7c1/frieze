[package]
name = "frieze-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories = ["command-line-utilities", "web-programming", "development-tools"]
description = "Command-line front-end for frieze."
# The end-to-end fixture packages under tests/ are workspaces of their
# own (and carry generated files); none of that belongs in the
# published package.
exclude = ["tests"]

# The cargo subcommand convention: a binary named `cargo-frieze` on
# the PATH makes `cargo frieze ...` work.
[[bin]]
name = "cargo-frieze"
path = "src/main.rs"

[dependencies]
frieze-model.workspace = true
frieze-usecase.workspace = true
frieze-wire.workspace = true

# The end-to-end tests compare the CLI's outputs against the library
# path (`compose` + `to_yaml`) for the same inputs, so they link the
# fixture crates directly.
#
# The internal dev-dependencies deliberately carry no `version`:
# version-less path dev-dependencies are stripped by `cargo publish`,
# so the published package does not depend on them being released.
[dev-dependencies]
frieze = { path = "../../libs/frieze", default-features = false }
frieze-openapi = { path = "../../libs/frieze-openapi" }
serde_yaml.workspace = true
serde_json.workspace = true
single-output = { path = "tests/fixtures/single-output" }
multi-output = { path = "tests/fixtures/multi-output" }
mixed-formats = { path = "tests/fixtures/mixed-formats" }
# The test binary enables the fixture's gated feature itself so the
# library-path comparison can register the gated type in-process; the
# CLI run under test gets it from the fixture's metadata instead.
feature-gated = { path = "tests/fixtures/feature-gated", features = ["extra"] }
# Workspace fixtures: only the frieze-configured member is linked (the
# byte-equivalence comparison needs its types); sibling members arrive
# transitively.
ws-api = { path = "tests/fixtures/workspace/ws-api" }
vw-api-v1 = { path = "tests/fixtures/virtual-workspace/api-v1" }
