[package]
name = "frieze"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Generate OpenAPI Schema Objects from Rust types via proc-macros."

[features]
default = ["oas-3-0", "inventory"]
oas-3-0 = ["frieze-openapi/oas-3-0", "frieze-usecase/oas-3-0"]
oas-3-1 = ["frieze-openapi/oas-3-1", "frieze-usecase/oas-3-1"]
# `inventory`-based collection (on by default). Enables
# `Schemas::builder().from_inventory()` and turns the derive macro's
# `inventory_submit!` token into a real `inventory::submit!` site.
# Disable with `default-features = false` for no_std / WASM / embedded
# targets; without this feature the same derive expansion is a no-op
# submission and `from_inventory()` is not available.
inventory = ["dep:inventory", "frieze-usecase/inventory"]

[dependencies]
frieze-model.workspace = true
frieze-usecase.workspace = true
frieze-openapi.workspace = true
frieze-macros.workspace = true
inventory = { workspace = true, optional = true }

[dev-dependencies]
insta.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
trybuild.workspace = true
